@if (visible()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 px-4"
    (click)="onBackdropClick($event)"
  >
    <div
      class="w-full max-w-md rounded-xl border border-border bg-card p-6 shadow-2xl shadow-black/50"
    >
      <h2 class="font-mono text-xl font-bold text-content-primary mb-2">{{ title() }}</h2>

      @if (message()) {
        <p class="text-sm text-content-secondary mb-6">{{ message() }}</p>
      }

      <div class="flex justify-end gap-3">
        <app-button variant="outline" (clicked)="onCancel()">{{ cancelLabel() }}</app-button>
        <app-button variant="danger" (clicked)="onConfirm()">{{ confirmLabel() }}</app-button>
      </div>
    </div>
  </div>
}
