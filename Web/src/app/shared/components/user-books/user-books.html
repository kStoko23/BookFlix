@if (authService.isLoggedIn() && books().length > 0) {
  <section class="bg-primary py-8 px-6 lg:px-14">
    <div class="flex items-center justify-between mb-5">
      <h2 class="font-mono text-2xl lg:text-4xl font-bold text-content-primary">My List</h2>
      <div class="flex items-center gap-4 text-content-secondary">
        <button (click)="prev()" class="w-8 h-8 cursor-pointer">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m15 18-6-6 6-6" />
          </svg>
        </button>
        <button (click)="next()" class="w-8 h-8 cursor-pointer">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>
      </div>
    </div>

    <div class="relative">
      <swiper-container
        #swiperRef
        slides-per-view="1"
        space-between="20"
        breakpoints='{"480": {"slidesPerView": 2}, "640": {"slidesPerView": 3}, "768": {"slidesPerView": 4}, "1280": {"slidesPerView": 5}, "1536": {"slidesPerView": 6}, "1920": {"slidesPerView": 8}}'
      >
        @for (book of books(); track book.id) {
          <swiper-slide>
            <div
              (click)="navigateToBook(book.id)"
              class="relative w-full bg-card rounded-md overflow-hidden cursor-pointer transition-transform duration-200 hover:scale-105 group"
            >
              <img
                [src]="getImageUrl(book)"
                [alt]="book.title"
                class="w-full h-[450px] object-cover object-center"
              />

              <span
                class="absolute top-2 right-2 bg-accent text-white text-md font-bold px-1.5 py-0.5 rounded inline-flex items-center gap-2"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
                  />
                </svg>
                {{ book.rating }}
              </span>

              <div
                class="hidden lg:flex absolute inset-0 flex-col items-center justify-center text-center bg-black/85 p-2.5 opacity-0 group-hover:opacity-100 transition-opacity"
              >
                <p class="font-sans text-content-primary text-lg font-medium elipsis mb-0.5">
                  {{ book.title }}
                </p>
                <p class="font-sans text-content-secondary text-md truncate">{{ book.author }}</p>
              </div>
              <div
                class="lg:hidden absolute bottom-0 inset-x-0 flex flex-col items-center justify-center text-center bg-black/85 p-2.5 h-[120px]"
              >
                <p class="font-sans text-content-primary text-lg font-medium elipsis mb-0.5">
                  {{ book.title }}
                </p>
                <p class="font-sans text-content-secondary text-md truncate">{{ book.author }}</p>
              </div>
            </div>
          </swiper-slide>
        }
      </swiper-container>
    </div>
  </section>
}
