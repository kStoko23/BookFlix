<ng-template #content><ng-content /></ng-template>

@if (href()) {
  <a [routerLink]="href()" [ngClass]="variantClasses()">
    <ng-container *ngTemplateOutlet="content" />
  </a>
} @else {
  <button
    [type]="type()"
    (click)="clicked.emit()"
    [disabled]="disabled()"
    [ngClass]="variantClasses()"
  >
    <ng-container *ngTemplateOutlet="content" />
  </button>
}
