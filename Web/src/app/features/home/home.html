<app-hero [books]="heroBooks()"></app-hero>
<app-user-books
  [books]="booksUser()"
  [isLoggedIn]="isLoggedIn()"
  [loading]="loadingUser()"
  [error]="errorUser()"
></app-user-books>
@defer (on viewport) {
  <app-books-slider
    [books]="booksTop()"
    title="Top 10"
    [loading]="loadingTop()"
    [error]="errorTop()"
  ></app-books-slider>
} @placeholder (minimum 200ms) {
  <div class="w-full h-[500px] px-14 py-8 bg-primary">
    <div
      class="h-full rounded-lg bg-card border-dashed border-2 border-border flex items-center justify-center"
    >
      <p class="text-lg font-semibold text-content-muted">Loading...</p>
    </div>
  </div>
}
@for (cat of categories; track cat.value) {
  @defer (on viewport) {
    <app-books-slider
      [books]="books()"
      [category]="cat.value"
      [title]="cat.label"
      [loading]="loadingCategories()"
      [error]="errorCategories()"
    />
  } @placeholder (minimum 200ms) {
    <div [id]="cat.slug" class="w-full h-[500px] px-14 py-8 bg-primary">
      <div
        class="h-full rounded-lg bg-card border-dashed border-2 border-border flex items-center justify-center"
      >
        <p class="text-lg font-semibold text-content-muted">Loading...</p>
      </div>
      >
    </div>
  }
}
