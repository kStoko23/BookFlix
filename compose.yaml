services:
  postgres:
    image: postgres:18
    container_name: bookflix-postgres
    environment:
      POSTGRES_DB: bookflix
      POSTGRES_USER: bookflix
      POSTGRES_PASSWORD: bookflix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookflix"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: Api
      dockerfile: Dockerfile
    container_name: bookflix-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=bookflix;Username=bookflix;Password=bookflix
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
